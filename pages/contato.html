<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Velvet Coffee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contato.css">
    <link rel="icon" href="../img/logo-velvet.png" type="image/png">
</head>

<body>

     <header class="header">
        <button class="menu-mobile" id="menuMobile">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav>

        <a href="../index.html" class="nav-logo">
            Velvet<span>Coffee</span>
        </a>

        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html" >Home</a></li>
            <li><a href="../pages/cardapio.html">Cardápio</a></li>         
            <li><a href="../pages/quiz.html">Quiz</a></li>
            <li><a href="../pages/contato.html" class="active">Contato</a></li>
        </ul>

        <div class="nav-actions">

             <button class="btn-icon" id="themeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>

           <a class="btn-icon" href="../pages/favoritos.html">
                <i class="fa-solid fa-heart"></i>
            </a>

            <a class="btn-icon"  href="../pages/carrinho.html">
                <i class="fa-solid fa-cart-shopping">
                <!-- <span class="badge show">3</span> -->
                </i>
            </a>
        </div>

    </nav>

        <button class="btn-icon" id="themeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>

    </header>

    <main class="page">

        <section class="section">

            <div class="container">

                <div class="section-header">

                    <h1 class="section-title">
                        Entre em Contato
                    </h1>

                    <div class="section-divider"></div>

                    <p class="section-sub">
                        Ficaremos felizes em falar com você.
                    </p>

                </div>

                <div class="contact-layout">

                    <!-- INFO -->
                    <div class="contact-info">

                        <div class="contact-item">

                            <div class="contact-icon">
                              <i class="fa-solid fa-location-dot"></i>
                            </div>

                            <div>
                                <p class="contact-label">
                                    endereço
                                </p>

                                <p class="contact-val">
                                    São Paulo, Brasil
                                </p>
                            </div>

                        </div>

                        <div class="contact-item">

                            <div class="contact-icon">
                                <i class="fa-solid fa-phone"></i>
                            </div>

                            <div>
                                <p class="contact-label">
                                    telefone
                                </p>

                                <p class="contact-val">
                                    (11) 99999-9999
                                </p>
                            </div>

                        </div>

                        <div class="contact-item">

                            <div class="contact-icon">
                               <i class="fa-solid fa-envelope"></i>
                            </div>

                            <div>
                                <p class="contact-label">
                                    email
                                </p>

                                <p class="contact-val">
                                    contato@coffee.com
                                </p>
                            </div>

                        </div>

                    </div>

                    <!-- FORM -->
                    <div class="form-card">

                        <form>

                            <div class="form-row">

                                <div class="form-group">

                                    <label>
                                        Nome
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        placeholder="Seu nome"
                                    >

                                </div>

                                <div class="form-group">

                                    <label>
                                        Email
                                    </label>

                                    <input
                                        type="email"
                                        class="form-control"
                                        placeholder="Seu email"
                                    >

                                </div>

                            </div>

                            <div class="form-group">

                                <label>
                                    Assunto
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Digite o assunto"
                                >

                            </div>

                            <div class="form-group">

                                <label>
                                    Mensagem
                                </label>

                                <textarea
                                    class="form-control"
                                    rows="6"
                                    placeholder="Digite sua mensagem"
                                ></textarea>

                            </div>

                            <button class="btn btn-primary">
                                Enviar Mensagem
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </section>

    </main>

<script src="../js/main.js"></script>
<script src="../js/cardapio.js"></script>
<script src="../js/favoritos.js"></script>
</body>

</html>
