<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | Velvet Coffee</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/carrinho.css">

    <link rel="icon"
        href="../img/logo-velvet.png"
        type="image/png">
</head>

<body>

    <!-- HEADER -->
    <header>

        <button class="menu-mobile" id="menuMobile">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav>

            <a href="../index.html" class="nav-logo">
                Velvet<span>Coffee</span>
            </a>

            <ul class="nav-links" id="nav-links">

                <li>
                    <a href="../index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="../pages/cardapio.html">
                        Cardápio
                    </a>
                </li>

                <li>
                    <a href="../pages/carrinho.html" class="active">
                        Carrinho
                    </a>
                </li>
                

                <li>
                    <a href="../pages/quiz.html">
                        Quiz
                    </a>
                </li>

                <li>
                    <a href="../pages/contato.html">
                        Contato
                    </a>
                </li>

            </ul>

            <div class="nav-actions">

                <button class="btn-icon" id="themeToggle">
                    <i class="fa-solid fa-moon"></i>
                </button>

                <a class="btn-icon"
                    href="../pages/favoritos.html">

                    <i class="fa-solid fa-heart"></i>

                </a>

                <a class="btn-icon"
                    href="../pages/carrinho.html">

                    <i class="fa-solid fa-cart-shopping"></i>

                </a>

            </div>

        </nav>

    </header>

    <!-- PAGE -->
    <main class="page">

        <section class="section">

            <div class="container">

                <!-- HEADER -->
                <div class="section-header">

                    <h1 class="section-title">
                        Seu Carrinho
                    </h1>

                    <div class="section-divider"></div>

                    <p class="section-sub">
                        Confira seus pedidos antes de finalizar a compra.
                    </p>

                </div>

                <!-- LAYOUT -->
                <div class="cart-layout">

                    <!-- ITENS -->
                    <div class="cart-items">

                        <!-- JS renderiza os produtos aqui -->

                    </div>

                    <!-- RESUMO -->
                    <aside class="cart-summary">

                        <h2 class="summary-title">
                            Resumo do Pedido
                        </h2>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>R$ 0</span>
                        </div>

                        <div class="summary-row">
                            <span>Entrega</span>
                            <span>R$ 8</span>
                        </div>

                        <div class="summary-row">
                            <span>Desconto</span>
                            <span>- R$ 0</span>
                        </div>

                        <div class="summary-total">
                            <span>Total</span>
                            <strong>R$ 0</strong>
                        </div>

                        <!-- CHECKOUT -->
                        <div class="checkout-form">

                            <input
                                type="text"
                                placeholder="Digite seu endereço"
                            >

                            <!-- SELECT ATUALIZADO -->
                            <select id="paymentMethod">

                                <option value="cartao">
                                    Cartão de Crédito
                                </option>

                                <option value="pix">
                                    PIX
                                </option>

                                <option value="dinheiro">
                                    Dinheiro
                                </option>

                            </select>

                            <a
                                class="btn btn-primary checkout-btn"
                                href="../pages/pagamento.html"
                            >
                                Finalizar Pedido
                            </a>

                        </div>

                    </aside>

                </div>

            </div>

        </section>

    </main>

    <script src="../js/main.js"></script>
    <script src="../js/cardapio.js"></script>
    <script src="../js/favoritos.js"></script>
    <script src="../js/carrinho.js"></script>

</body>
</html>
