<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | Velvet Coffee</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/carrinho.css">
    <link rel="stylesheet" href="../css/auth.css">

    <link rel="icon"
        href="../img/logo-velvet.png"
        type="image/png">
</head>

<body>

    <header>

        <button class="menu-mobile" id="menuMobile">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav>
            <a href="../index.html" class="nav-logo">Velvet<span>Coffee</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../pages/cardapio.html">Cardápio</a></li>
                <li><a href="../pages/carrinho.html" class="active">Carrinho</a></li>
                <li><a href="../pages/favoritos.html">Favoritos</a></li>
                <li><a href="../pages/quiz.html">Quiz</a></li>
                <li><a href="../pages/contato.html">Contato</a></li>
            </ul>
            <div class="nav-actions">
                <div class="mobile-only">
                    <a class="btn-icon" href="../pages/login.html">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </div>  

                <button class="btn-icon" id="themeToggle">
                    <i class="fa-solid fa-moon"></i>
                </button>
               
                <a class="btn-icon" href="../pages/carrinho.html" class="active">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </div>
        </nav>

    </header>

    <main class="page">

        <section class="section">

            <div class="container">

                <div class="section-header">
                    <h1 class="section-title">Seu Carrinho</h1>
                    <div class="section-divider"></div>
                    <p class="section-sub">Confira seus pedidos antes de finalizar a compra.</p>
                </div>

                <div class="cart-layout">

                    <div class="cart-items">
                    </div>

                    <aside class="cart-summary">

                        <h2 class="summary-title">Resumo do Pedido</h2>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="summarySubtotal">R$ 0</span>
                        </div>

                        <div class="summary-row">
                            <span>Entrega</span>
                            <span>R$ 8</span>
                        </div>

                        <div class="summary-row" id="rowDesconto" style="display:none;">
                            <span>Cupom <span id="cupomNome" class="cupom-badge"></span></span>
                            <span id="summaryDesconto" class="desconto-value">- R$ 0</span>
                        </div>

                        <div class="summary-total">
                            <span>Total</span>
                            <strong id="summaryTotal">R$ 0</strong>
                        </div>

                        <div class="checkout-form" id="checkoutForm">

                            <div class="checkout-section">
                                <h3 class="checkout-section-title">
                                    <i class="fa-solid fa-tag"></i> Cupom de Desconto
                                </h3>
                                <div class="coupon-wrap">
                                    <input
                                        type="text"
                                        id="cupomInput"
                                        placeholder="Ex: VELVET10"
                                        class="checkout-input coupon-input"
                                        autocomplete="off"
                                    >
                                    <button type="button" id="btnAplicarCupom" class="btn-apply-coupon">
                                        Aplicar
                                    </button>
                                </div>
                                <div class="coupon-feedback" id="cupomFeedback"></div>
                            </div>

                            <div class="checkout-section">
                                <h3 class="checkout-section-title">
                                    <i class="fa-solid fa-credit-card"></i> Forma de Pagamento
                                </h3>
                                <select id="paymentMethod" class="checkout-select">
                                    <option value="cartao">Cartão de Crédito</option>
                                    <option value="pix">PIX</option>
                                    <option value="dinheiro">Dinheiro</option>
                                </select>
                            </div>

                            <button
                                class="btn btn-primary checkout-btn"
                                id="checkoutBtn"
                            >
                                Ir para Pagamento
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>

                        </div>

                    </aside>

                </div>

            </div>

        </section>

    </main>

    <div id="toast-container"></div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/carrinho.js"></script>

</body>
</html>
