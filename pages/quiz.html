    <link rel="stylesheet" href="../css/style.css">
   
</head>

<body>

     <header class="header">
         <button class="menu-mobile" id="menuMobile">
            <i class="fa-solid fa-bars"></i>
        </button>
        

        <nav>

        <a href="index.html" class="nav-logo">
            Velvet<span>Coffee</span>
        </a>

        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../pages/cardapio.html">Cardápio</a></li>
            <li><a href="../pages/favoritos.html">Favoritos</a></li>
            <li><a href="../pages/quiz.html"  class="active">Quiz</a></li>
            <li><a href="../pages/contato.html">Contato</a></li>
        </ul>

        <div class="nav-actions">

             <button class="btn-icon" id="themeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>

           <a class="btn-icon" href="/pages/favoritos.html">
                <i class="fa-solid fa-heart"></i>
            </a>

        </div>

    </nav>

        <button class="btn-theme">
            ☾
        </button>

    </header>

    <main class="page">

        <section class="section">

            <div class="container">

                <div class="quiz-wrap">

                    <div class="quiz-progress">
                        <div class="quiz-progress-bar"></div>
                    </div>

                    <h1 class="quiz-question">
                        Qual tipo de café combina com sua personalidade?
                    </h1>

                    <p class="quiz-sub">
                        Escolha a opção que mais combina com você.
                    </p>

                    <div class="quiz-options">

                        <button class="quiz-opt">

                            <span class="quiz-opt-icon">
                                <i class="fa-solid fa-bolt"></i>
                            </span>

                            <span class="quiz-opt-text">
                                Forte e intenso
                            </span>

                            <p class="quiz-opt-sub">
                                Para quem gosta de energia.
                            </p>

                        </button>

                        <button class="quiz-opt">

                            <span class="quiz-opt-icon">
                                <i class="fa-solid fa-heart"></i>
                            </span>

                            <span class="quiz-opt-text">
                                Suave e cremoso
                            </span>

                            <p class="quiz-opt-sub">
                                Equilíbrio e conforto.
                            </p>

                        </button>

                        <button class="quiz-opt">

                            <span class="quiz-opt-icon">
                                <i class="fa-solid fa-snowflake"></i>
                            </span>

                            <span class="quiz-opt-text">
                                Refrescante
                            </span>

                            <p class="quiz-opt-sub">
                                Algo moderno e leve.
                            </p>

                        </button>

                        <button class="quiz-opt">

                            <span class="quiz-opt-icon">
                                <i class="fa-solid fa-cookie"></i>
                            </span>

                            <span class="quiz-opt-text">
                                Doce e aconchegante
                            </span>

                            <p class="quiz-opt-sub">
                                Cafés mais suaves e doces.
                            </p>

                        </button>

                    </div>

                    <div class="quiz-nav">

                        <button class="btn btn-primary">
                            Ver Resultado
                        </button>

                    </div>

                </div>

            </div>

        </section>

    </main>
